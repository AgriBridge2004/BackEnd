version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: agribridge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agribridge_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: agribridge_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    ports:
      - '${PORT}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agribridge_network
    command: npm run start:dev

volumes:
  postgres_data:

networks:
  agribridge_network:
    driver: bridge